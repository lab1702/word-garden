services:
  db:
    restart: unless-stopped
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: wordgarden
      POSTGRES_PASSWORD: wordgarden_dev
      POSTGRES_DB: wordgarden
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wordgarden"]
      interval: 2s
      timeout: 5s
      retries: 10

  app:
    restart: unless-stopped
    build:
      context: .
      args:
        VITE_BASE_PATH: /word
    ports:
      - "9000:3000"
    environment:
      DATABASE_URL: postgres://wordgarden:wordgarden_dev@db:5432/wordgarden
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set}
      RP_ID: ${RP_ID:-localhost}
      RP_NAME: ${RP_NAME:-Word Garden}
      ORIGIN: ${ORIGIN:-http://localhost:9000}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
